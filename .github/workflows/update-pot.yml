name: Update translation template

on:
  push:
    branches: [main]
    paths:
      - "faugus/**.py"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-pot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check translatable strings
        id: check
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BEFORE" HEAD \
                      -- ':(glob)faugus/**/*.py')
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$CHANGED" | xargs -d '\n' grep -l '_(' > /dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for f in $CHANGED; do
            [ ! -f "$f" ] && echo "skip=false" >> "$GITHUB_OUTPUT" && exit 0
          done
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Regenerate languages/faugus-launcher.pot
        if: steps.check.outputs.skip != 'true'
        run: |
          xgettext --language=Python --keyword=_ --from-code=UTF-8 \
            --package-name=faugus-launcher \
            --output=languages/faugus-launcher.pot \
            faugus/*.py

      - name: Update language .po files (msgmerge)
        if: steps.check.outputs.skip != 'true'
        run: |
          for po in languages/*/faugus-launcher.po; do
            msgmerge --update --backup=none "$po" languages/faugus-launcher.pot
          done

      - name: Compile translation files (msgfmt)
        run: |
          for po in languages/*/faugus-launcher.po; do
            msgfmt "$po" -o "$(dirname "$po")/faugus-launcher.mo"
          done

      - name: Commit if .pot, .po or .mo actually changed
        run: |
          changed=false
          for f in languages/faugus-launcher.pot languages/*/faugus-launcher.po languages/*/faugus-launcher.mo; do
            if ! diff --ignore-matching-lines='^#:' \
                       --ignore-matching-lines='^"POT-Creation-Date:' \
                       --ignore-matching-lines='^"PO-Revision-Date:' \
                       <(git show "HEAD:$f" 2>/dev/null) "$f" > /dev/null 2>&1; then
              changed=true
              break
            fi
          done
          if [ "$changed" = false ]; then
            echo "No .pot/.po/.mo changes, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages/faugus-launcher.pot languages/*/faugus-launcher.po languages/*/faugus-launcher.mo
          git commit -m "Update translation template (faugus-launcher.pot)"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
